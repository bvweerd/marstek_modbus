              state_attr('pyscript.marstek_efficiency_discharge_0900_0999w_pct', 'input_kwh') | float(0) | round(3),
              state_attr('pyscript.marstek_efficiency_discharge_1000_1099w_pct', 'input_kwh') | float(0) | round(3),
              state_attr('pyscript.marstek_efficiency_discharge_1100_1199w_pct', 'input_kwh') | float(0) | round(3),
