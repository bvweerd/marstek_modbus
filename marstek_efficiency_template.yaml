              state_attr('pyscript.marstek_efficiency_discharge_0900_0999w_pct', 'samples') | int(0),
              state_attr('pyscript.marstek_efficiency_discharge_1000_1099w_pct', 'samples') | int(0),
              state_attr('pyscript.marstek_efficiency_discharge_1100_1199w_pct', 'samples') | int(0),
