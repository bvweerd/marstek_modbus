################################################################################
# Marstek Venus A — Efficiency Buckets ApexCharts Card
#
# Requirements:
#   - apexcharts-card (HACS): https://github.com/RomRider/apexcharts-card
#
# Usage:
#   In Lovelace dashboard → Edit → Add Card → Manual card
#   Paste the YAML below (without these comment lines if desired)
################################################################################

type: custom:apexcharts-card
graph_span: 2h

header:
  show: true
  title: Marstek — Efficiëntie per Vermogensbucket

all_series_config:
  type: column
  group_by:
    func: last
    duration: 2h
  show:
    legend_value: false
    in_header: false

apex_config:
  chart:
    height: 320
  plotOptions:
    bar:
      columnWidth: 80%
      borderRadius: 3
  dataLabels:
    enabled: false
  yaxis:
    min: 0
    max: 100
    title:
      text: "Efficiëntie (%)"
  xaxis:
    labels:
      show: false

series:
  # ── Laden (blauw) ──────────────────────────────────────────────────────────
  - entity: pyscript.marstek_efficiency_charge_0100_0199w_pct
    name: "Laden 100W"
    color: "#1565C0"
  - entity: pyscript.marstek_efficiency_charge_0200_0299w_pct
    name: "Laden 200W"
    color: "#1976D2"
  - entity: pyscript.marstek_efficiency_charge_0300_0399w_pct
    name: "Laden 300W"
    color: "#1E88E5"
