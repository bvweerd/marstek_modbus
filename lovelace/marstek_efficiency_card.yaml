    name: "Laden 600W"
    color: "#64B5F6"
  - entity: pyscript.marstek_efficiency_charge_0700_0799w_pct
    name: "Laden 700W"
    color: "#90CAF9"
  - entity: pyscript.marstek_efficiency_charge_0800_0899w_pct
    name: "Laden 800W"
