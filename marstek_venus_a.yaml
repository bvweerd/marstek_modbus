    # ─────────────────────────────────────────────────────────────────────────
    # NUMBERS — adjustable registers via UI
    # ─────────────────────────────────────────────────────────────────────────
    numbers:

      # Force charge power (only active when RS485 control is ON)
      - name: "Marstek Charge Power"
        unique_id: marstek_charge_power_number
        slave: 1
        address: 42020
        data_type: uint16
        min_value: 0
        max_value: 1200
        step: 50
        unit_of_measurement: "W"
        write_type: holding
        scan_interval: 15

      # Force discharge power (only active when RS485 control is ON)
