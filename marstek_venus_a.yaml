################################################################################
# Marstek Venus A — Home Assistant Modbus Package
# Firmware: >= 147 (V1/V2 hardware, RS485-to-TCP adapter required)
#
# Hardware: Elfin EW11 / PUSR DR134 / Waveshare RS485-to-ETH
#   RS485 adapter settings: 115200 baud, 8N1, Slave ID 1
#   RS485 pinout Marstek connector:
#     Pin 1 = A (+) yellow | Pin 2 = B (-) red | Pin 3 = GND black
#
# Installation:
#   1. Place this file in config/packages/
#   2. Add to configuration.yaml:
#        homeassistant:
#          packages:
#            marstek: !include packages/marstek_venus_a.yaml
#   3. Set marstek_host in secrets.yaml:
#        marstek_host: "192.168.x.x"
#   4. Restart Home Assistant
#
# For control/automation: see scripts at the bottom of this file
################################################################################

# ─────────────────────────────────────────────────────────────────────────────
# MODBUS HUB + ENTITIES
# ─────────────────────────────────────────────────────────────────────────────
modbus:
  - name: marstek_venus
    type: tcp
    host: 192.168.2.19   # or hardcode: "192.168.1.100"
    port: 502
    timeout: 5
    message_wait_milliseconds: 50  # Minimum 35ms, 50ms for reliability

    # ─────────────────────────────────────────────────────────────────────────
    # SENSORS (read-only, FC03 holding registers)
    # ─────────────────────────────────────────────────────────────────────────
    sensors:

      # ── Battery measurements ───────────────────────────────────────────────

      - name: "Marstek Battery Voltage"
        unique_id: marstek_battery_voltage
        slave: 1
        address: 32100
        input_type: holding
        data_type: uint16
        scale: 0.01
        precision: 2
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        scan_interval: 30

      - name: "Marstek Battery Current"
        unique_id: marstek_battery_current
        slave: 1
        address: 32101
        input_type: holding
        data_type: int16      # Positive = charging, negative = discharging
        scale: 0.01
        precision: 2
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        scan_interval: 10

      - name: "Marstek Battery Power"
        unique_id: marstek_battery_power
        slave: 1
        address: 32102
        input_type: holding
        data_type: int32      # 2 registers, positive = charging, negative = discharging
        scale: 1
        precision: 0
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        scan_interval: 10

      - name: "Marstek Battery SOC"
        unique_id: marstek_battery_soc
        slave: 1
        address: 32104
        input_type: holding
        data_type: uint16
        scale: 1
        precision: 0
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        scan_interval: 30

      - name: "Marstek Battery Capacity"
        unique_id: marstek_battery_capacity
        slave: 1
        address: 32105
        input_type: holding
        data_type: uint16
        scale: 0.001
        precision: 3
        unit_of_measurement: "kWh"
        device_class: energy_storage
        scan_interval: 3600         # Static, rarely changes

      # ── AC Grid measurements ───────────────────────────────────────────────

