# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE SENSORS — user-friendly display
# ─────────────────────────────────────────────────────────────────────────────
template:
  - sensor:
      - name: "Marstek Status"
        unique_id: marstek_inverter_state_text
        state: >-
          {% set s = states('sensor.marstek_inverter_state_raw') | int(-1) %}
          {% set map = {
            0: 'Sleep',
            1: 'Standby',
            2: 'Charging',
            3: 'Discharging',
            4: 'Backup Mode',
            5: 'OTA Upgrade',
            6: 'Bypass'
          } %}
          {{ map.get(s, 'Unknown') }}
        icon: >-
          {% set s = states('sensor.marstek_inverter_state_raw') | int(-1) %}
          {% if s == 2 %} mdi:battery-charging
          {% elif s == 3 %} mdi:battery-arrow-down
          {% elif s == 4 %} mdi:home-battery
          {% elif s == 0 %} mdi:sleep
          {% else %} mdi:battery
          {% endif %}

      - name: "Marstek Work Mode"
        unique_id: marstek_work_mode_text
        state: >-
          {% set m = states('sensor.marstek_work_mode_raw') | int(-1) %}
          {% set map = {0: 'Manual', 1: 'Anti Feed-In', 2: 'Trade Mode'} %}
          {{ map.get(m, 'Unknown') }}

      - name: "Marstek Force Mode"
        unique_id: marstek_force_mode_text
        state: >-
          {% set m = states('sensor.marstek_force_mode_raw') | int(-1) %}
          {% set map = {0: 'Stopped', 1: 'Force Charge', 2: 'Force Discharge'} %}
          {{ map.get(m, 'Unknown') }}
        icon: >-
          {% set m = states('sensor.marstek_force_mode_raw') | int(-1) %}
          {% if m == 1 %} mdi:battery-charging-high
          {% elif m == 2 %} mdi:battery-arrow-down-outline
          {% else %} mdi:battery-sync
          {% endif %}

      - name: "Marstek RS485 Control Status"
        unique_id: marstek_rs485_status_text
        state: >-
          {% set v = states('sensor.marstek_rs485_control_mode_raw') | int(0) %}
          {% if v == 21930 %} Active (0x55AA)
          {% else %} Inactive
          {% endif %}
        icon: >-
          {% if states('sensor.marstek_rs485_control_mode_raw') | int(0) == 21930 %}
            mdi:remote
          {% else %}
            mdi:remote-off
          {% endif %}

      - name: "Marstek Alarm Description"
        unique_id: marstek_alarm_description
        state: >-
          {% set bits = states('sensor.marstek_alarm_status_bits') | int(0) %}
          {% if bits == 0 %}
            No alarms
          {% else %}
            {% set alarms = [] %}
            {% if bits | bitwise_and(1) %} {% set alarms = alarms + ['PLL Restart'] %} {% endif %}
            {% if bits | bitwise_and(2) %} {% set alarms = alarms + ['Overheating'] %} {% endif %}
            {% if bits | bitwise_and(4) %} {% set alarms = alarms + ['Low Temperature'] %} {% endif %}
            {% if bits | bitwise_and(8) %} {% set alarms = alarms + ['Fan Fault'] %} {% endif %}
            {% if bits | bitwise_and(16) %} {% set alarms = alarms + ['Low SOC'] %} {% endif %}
            {% if bits | bitwise_and(32) %} {% set alarms = alarms + ['Output Overcurrent'] %} {% endif %}
            {% if bits | bitwise_and(64) %} {% set alarms = alarms + ['Line Sequence Fault'] %} {% endif %}
            {% if bits | bitwise_and(128) %} {% set alarms = alarms + ['WiFi Abnormal'] %} {% endif %}
            {% if bits | bitwise_and(256) %} {% set alarms = alarms + ['BLE Abnormal'] %} {% endif %}
            {% if bits | bitwise_and(512) %} {% set alarms = alarms + ['Network Abnormal'] %} {% endif %}
            {% if bits | bitwise_and(1024) %} {% set alarms = alarms + ['CT Connection Abnormal'] %} {% endif %}
            {{ alarms | join(', ') }}
          {% endif %}
        icon: >-
          {% if states('sensor.marstek_alarm_status_bits') | int(0) > 0 %}
            mdi:alert-circle
          {% else %}
            mdi:check-circle
          {% endif %}

      - name: "Marstek Net Power"
        unique_id: marstek_net_power
        state: >-
          {{ states('sensor.marstek_battery_power') | float(0) | round(0) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        attributes:
          charge_power: >-
            {% set p = states('sensor.marstek_battery_power') | float(0) %}
            {{ [p, 0] | max | round(0) }}
          discharge_power: >-
            {% set p = states('sensor.marstek_battery_power') | float(0) %}
            {{ [(-p), 0] | max | round(0) }}


# ─────────────────────────────────────────────────────────────────────────────
# INPUT HELPERS — UI for work mode and force mode
# ─────────────────────────────────────────────────────────────────────────────
input_select:
  marstek_work_mode:
    name: "Marstek Work Mode Setting"
    options:
      - "Manual"
      - "Anti Feed-In"
      - "Trade Mode"
    initial: "Manual"
    icon: mdi:battery-sync

  marstek_force_mode:
    name: "Marstek Force Mode"
    options:
      - "Automatic (stop forcing)"
      - "Force Charge"
      - "Force Discharge"
    initial: "Automatic (stop forcing)"
    icon: mdi:battery-charging

input_number:
  marstek_desired_charge_power:
    name: "Marstek Desired Charge Power"
    min: 0
    max: 1200
    step: 50
    unit_of_measurement: "W"
    icon: mdi:lightning-bolt

  marstek_desired_discharge_power:
    name: "Marstek Desired Discharge Power"
    min: 0
    max: 1200
    step: 50
    unit_of_measurement: "W"
    icon: mdi:lightning-bolt-outline

  marstek_charge_target_soc:
    name: "Marstek Charge Target SOC"
    min: 10
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-charging-100


# ─────────────────────────────────────────────────────────────────────────────
# INPUT BOOLEANS — on/off toggles for control modes
# ─────────────────────────────────────────────────────────────────────────────
input_boolean:

  marstek_anti_feedin_enabled:
    name: "Marstek Anti Feed-In Enable"
    icon: mdi:transmission-tower-off

  marstek_zero_grid_enabled:
    name: "Marstek Zero-Grid Control"
    icon: mdi:home-lightning-bolt

  # Nul op de meter zonder ontladen:
  # Laadt de accu uitsluitend bij zonne-overschot (export naar net).
  # Bij import van het net stopt de sturing — de accu ontlaadt NIET.
  marstek_solar_capture_enabled:
    name: "Marstek Zonne-Overschot Opslaan"
    icon: mdi:solar-power


# ─────────────────────────────────────────────────────────────────────────────
# SCRIPTS — reusable control actions
# ─────────────────────────────────────────────────────────────────────────────
script:

  # ── Enable / disable RS485 control ────────────────────────────────────────

  marstek_rs485_enable:
    alias: "Marstek: Enable RS485 Control"
    description: >
      Enables RS485 remote control (writes 0x55AA to register 42000).
      Required before force charge/discharge will work.
    sequence:
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42000
          value: 21930    # 0x55AA = enable
      - delay:
          milliseconds: 100

  marstek_rs485_disable:
    alias: "Marstek: Disable RS485 Control"
    description: >
      Disables RS485 remote control (writes 0x55BB to register 42000).
      Battery returns to automatic mode.
    sequence:
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42000
          value: 21947    # 0x55BB = disable
      - delay:
          milliseconds: 100

  # ── Force charge ───────────────────────────────────────────────────────────

  marstek_force_charge:
    alias: "Marstek: Force Charge"
    description: >
      Enables RS485, sets mode to charge, sets power.
      Call via: script.marstek_force_charge (power and target_soc are optional)
    fields:
      power:
        description: "Charge power in Watts (50–1200, default 1000)"
        example: 1500
        default: 1000
        selector:
          number:
            min: 50
            max: 1200
            step: 50
            unit_of_measurement: W
      target_soc:
        description: "Stop charging at this SOC% (10–100, default 80)"
        example: 90
        default: 80
        selector:
          number:
            min: 10
            max: 100
            step: 5
            unit_of_measurement: "%"
    sequence:
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42000
          value: 21930            # Enable RS485
      - delay:
          milliseconds: 100
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42011
          value: "{{ target_soc | default(80) | int }}"
      - delay:
          milliseconds: 50
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42020
          value: "{{ power | default(1000) | int }}"
      - delay:
          milliseconds: 50
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42010
          value: 1                # Charge
      - action: input_select.select_option
        target:
          entity_id: input_select.marstek_force_mode
        data:
          option: "Force Charge"

  # ── Force discharge ────────────────────────────────────────────────────────

  marstek_force_discharge:
    alias: "Marstek: Force Discharge"
    description: >
      Enables RS485, sets mode to discharge, sets power.
    fields:
      power:
        description: "Discharge power in Watts (50–1200, default 1000)"
        example: 1500
        default: 1000
        selector:
          number:
            min: 50
            max: 1200
            step: 50
            unit_of_measurement: W
    sequence:
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42000
          value: 21930            # Enable RS485
      - delay:
          milliseconds: 100
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42021
          value: "{{ power | default(1000) | int }}"
      - delay:
          milliseconds: 50
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42010
          value: 2                # Discharge
      - action: input_select.select_option
        target:
          entity_id: input_select.marstek_force_mode
        data:
          option: "Force Discharge"

  # ── Stop forcing — return to automatic ────────────────────────────────────

  marstek_stop_forcing:
    alias: "Marstek: Stop Forcing (Automatic)"
    description: >
      Sets force mode to Stop (register 42010 = 0).
      Also disables RS485 control so battery operates fully automatically.
    sequence:
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42010
          value: 0                # Stop
      - delay:
          milliseconds: 100
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 42000
          value: 21947            # Disable RS485
      - action: input_select.select_option
        target:
          entity_id: input_select.marstek_force_mode
        data:
          option: "Automatic (stop forcing)"

  # ── Set work mode ──────────────────────────────────────────────────────────

  marstek_set_work_mode:
    alias: "Marstek: Set Work Mode"
    description: >
      Sets the work mode via register 43000.
      0=Manual, 1=Anti Feed-In, 2=Trade Mode
    fields:
      mode:
        description: "Mode (0=Manual, 1=Anti Feed-In, 2=Trade Mode)"
        example: 1
        default: 0
        selector:
          number:
            min: 0
            max: 2
            step: 1
    sequence:
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 43000
          value: "{{ mode | default(0) | int }}"

  # ── Set power limits ───────────────────────────────────────────────────────

  marstek_set_power_limits:
    alias: "Marstek: Set Power Limits"
    description: >
      Sets permanent max charge and discharge power (registers 44002, 44003).
    fields:
      max_charge:
        description: "Max charge power in Watts (0–1200)"
        default: 1200
      max_discharge:
        description: "Max discharge power in Watts (0–1200)"
        default: 1200
    sequence:
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 44002
          value: "{{ max_charge | default(1200) | int }}"
      - delay:
          milliseconds: 50
      - action: modbus.write_register
        data:
          hub: marstek_venus
          slave: 1
          address: 44003
          value: "{{ max_discharge | default(1200) | int }}"
