    # SWITCHES (read + write)
    # ─────────────────────────────────────────────────────────────────────────
    switches:

      # RS485 remote control — REQUIRED for force charge/discharge
      # NOTE: 21930 (0x55AA) = on, 21947 (0x55BB) = off
      - name: "Marstek RS485 Control"
        unique_id: marstek_rs485_control_switch
        slave: 1
        address: 42000
        write_type: holding
        command_on: 21930
        command_off: 21947
        scan_interval: 15

#      # Backup mode (emergency power output)
#      # NOTE: inverted logic — 0=on, 1=off
